<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Birthday Glass Magic ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #ff9a9e 0%, #fecfef 25%, #fad0c4 50%, #ffd1ff 75%, #ffcccb 100%);
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
            --pink-glow: #ff69b4;
            --rose-glow: #ff1493;
            --soft-red: #ff6b9d;
            --peach-glow: #ffcccb;
            --text-main: #1a0d1a;
            --text-soft: #2d1b2d;
            --text-glow: rgba(255, 255, 255, 0.8);
            --premium-shadow: 0 8px 32px rgba(0,0,0,0.2);
            --subtle-glow: 0 0 15px rgba(255, 105, 180, 0.3);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        html { height: 100%; touch-action: manipulation; }

        body {
            min-height: 100vh;
            max-height: 100vh;
            height: 100vh;
            overflow: hidden;
            background: var(--bg-gradient);
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: clamp(0.5rem, 2vw, 1.5rem);
        }

        /* Optimized Sky */
        .sky {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        .balloon {
            position: absolute;
            bottom: -80px;
            width: clamp(35px, 4.5vw, 50px);
            height: clamp(55px, 6.5vw, 70px);
            border-radius: 50% 50% 50% 50% / 35% 35% 65% 65%;
            animation: floatUp 15s infinite ease-in-out;
            opacity: 0.7;
        }

        .balloon:nth-child(1) { left: 8%; background: linear-gradient(145deg, #ff9a9e, #fecfef); animation-delay: 0s; }
        .balloon:nth-child(2) { left: 22%; background: linear-gradient(145deg, #fad0c4, #ffd1ff); animation-delay: 2s; }
        .balloon:nth-child(3) { left: 38%; background: linear-gradient(145deg, #ff6b9d, #ff69b4); animation-delay: 4s; }
        .balloon:nth-child(4) { left: 52%; background: linear-gradient(145deg, #ffcccb, #ffb6c1); animation-delay: 1s; }
        .balloon:nth-child(5) { left: 68%; background: linear-gradient(145deg, #fecfef, #fad0c4); animation-delay: 3s; }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.7; }
            50% { transform: translateY(-80vh) rotate(5deg) scale(1.05); opacity: 0.9; }
            100% { transform: translateY(-160vh) rotate(-3deg) scale(0.95); opacity: 0.7; }
        }

        #card-toggle { display: none; }

        /* Button */
        .open-btn {
            z-index: 15;
            background: linear-gradient(135deg, var(--soft-red), var(--peach-glow));
            color: var(--text-main);
            padding: clamp(12px, 4vh, 18px) clamp(24px, 12vw, 45px);
            font-size: clamp(1rem, 4vw, 1.35rem);
            font-weight: 600;
            border-radius: 35px;
            cursor: pointer;
            box-shadow: var(--premium-shadow);
            transition: all 0.4s ease;
            border: 2px solid var(--glass-border);
            backdrop-filter: blur(15px);
            width: min(92vw, 300px);
            text-align: center;
        }

        .open-btn:hover {
            transform: translateY(-6px);
            box-shadow: var(--premium-shadow), var(--subtle-glow);
            background: linear-gradient(135deg, var(--pink-glow), var(--peach-glow));
            color: #fff;
        }

        /* Card Wrapper */
        .card-wrapper {
            position: absolute;
            z-index: 25;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            pointer-events: none;
            padding: clamp(1rem, 3vw, 2rem);
            width: 100%;
            box-sizing: border-box;
        }

        /* Reduced Shine Glass Card */
        .wish-card {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(20px) brightness(1.1);
            width: 90%;
            max-width: clamp(580px, 90vw, 360px);
            padding: clamp(24px, 8vh, 38px) clamp(24px, 7vw, 34px);
            border-radius: 25px;
            text-align: center;
            border: 1px solid var(--glass-border);
            box-shadow: var(--premium-shadow), 0 0 20px rgba(255, 105, 180, 0.2);
            transform: scale(0.9) rotateX(20deg);
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
        }

        /* Toggle */
        #card-toggle:checked ~ .open-btn {
            opacity: 0;
            transform: translateY(-20px) scale(0.8);
        }

        #card-toggle:checked ~ .card-wrapper .wish-card {
            transform: scale(1) rotateX(0deg);
            opacity: 1;
            animation: cardEntry 1s ease-out;
        }

        @keyframes cardEntry {
            0% { transform: scale(0.6) rotateX(60deg); opacity: 0; }
            100% { transform: scale(1) rotateX(0deg); opacity: 1; }
        }

        /* Subtle Aura - Less Intense */
        @keyframes subtleAura {
            0%, 100% { box-shadow: var(--premium-shadow), 0 0 12px rgba(255,105,180,0.25); }
            50% { box-shadow: var(--premium-shadow), 0 0 20px rgba(255,105,180,0.35); }
        }

        .wish-card { animation: subtleAura 4s infinite ease-in-out; }

        /* Reduced Shimmer */
        .wish-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 90%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            animation: subtleShimmer 5s infinite;
        }

        @keyframes subtleShimmer {
            0% { left: -100%; opacity: 0; }
            50% { opacity: 1; }
            100% { left: 100%; opacity: 0; }
        }

        /* FIXED Visible Image - No Overlays */
        .profile-img {
            width: clamp(150px, 18vw, 140px);
            height: clamp(250px, 18vw, 140px);
            border-radius: 50%;
            margin: 0 auto 20px;
            background: #f9f5f9 url('saps.jpeg') center/cover no-repeat;
            border: 4px solid rgba(255, 182, 193, 0.9);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            position: relative;
            transition: all 0.4s ease;
        }

        .profile-img:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 35px rgba(255, 105, 180, 0.4);
        }

        /* HIGH CONTRAST Typography */
        h1 {
            font-size: clamp(1.6rem, 6.5vw, 2.1rem);
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-main);
            text-shadow: 0 2px 12px rgba(0,0,0,0.4);
            line-height: 1.25;
        }

        p {
            color: var(--text-soft);
            font-size: clamp(1rem, 3.5vw, 1.12rem);
            line-height: 1.65;
            margin-bottom: 22px;
            font-weight: 400;
            text-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        .emojis {
            font-size: clamp(2.1rem, 10vw, 2.8rem);
            margin: 20px 0;
            animation: emojiFloat 3s infinite ease-in-out;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        @keyframes emojiFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Back Button */
        .close-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: clamp(0.95rem, 3vw, 1.05rem);
            color: var(--text-main);
            cursor: pointer;
            padding: clamp(12px, 3.5vh, 16px) clamp(28px, 9vw, 36px);
            border-radius: 30px;
            transition: all 0.35s ease;
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            font-weight: 500;
            text-decoration: none;
            background: rgba(255,255,255,0.2);
            z-index: 40;
            pointer-events: auto;
            box-shadow: var(--premium-shadow);
        }

        .close-link:hover {
            background: rgba(255,255,255,0.4);
            transform: translateY(-3px);
            box-shadow: var(--premium-shadow), var(--subtle-glow);
            color: #1a0d1a;
        }

        /* Subtle Particles */
        .particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 2;
        }

        .particle {
            position: absolute;
            opacity: 0.5;
            animation: particleFloat 10s infinite ease-in-out;
            font-size: clamp(1rem, 3.5vw, 1.4rem);
        }

        .particle-1 { top: 12%; left: 15%; animation-delay: 0s; }
        .particle-2 { top: 45%; right: 20%; animation-delay: 3s; }
        .particle-3 { bottom: 18%; left: 20%; animation-delay: 6s; }

        @keyframes particleFloat {
            0%, 100% { transform: translateY(0); opacity: 0.5; }
            50% { transform: translateY(-15px); opacity: 0.8; }
        }

        /* Responsive Media Queries */
        @media (max-width: 420px) {
            .wish-card { max-width: 300px; padding: 24px 20px; }
            body { padding: 0.75rem; }
        }

        @media (max-width: 360px) {
            .wish-card { max-width: 280px; padding: 20px 18px; }
        }

        @media (max-height: 650px) {
            body { padding-top: clamp(0.25rem, 1vh, 0.75rem); }
            .wish-card { padding-top: 20px; padding-bottom: 20px; }
        }

        @media (max-height: 550px) {
            .wish-card { max-height: 90vh; overflow-y: auto; }
        }

        @media (orientation: landscape) and (max-height: 450px) {
            .wish-card { max-width: 270px; padding: 18px 16px; }
        }
    </style>
</head>
<body>
    <div class="sky">
        <div class="balloon"></div><div class="balloon"></div><div class="balloon"></div>
        <div class="balloon"></div><div class="balloon"></div>
    </div>

    <input type="checkbox" id="card-toggle">

    <label for="card-toggle" class="open-btn">
        🎁 Touch for Birthday Magic ✨
    </label>

    <div class="card-wrapper">
        <div class="wish-card">
            <div class="particles">
                <span class="particle particle-1">✨</span>
                <span class="particle particle-2"></span>
                <span class="particle particle-3"></span>
            </div>
            <div class="profile-img"></div>
            <h1>Happy Birthday Jaan! 🎂💐</h1>
            <p>From Your Loved One 💕<br><br>A beautiful soul who brings so much joy to my life. Wishing you the most blessed, wonderful birthday – as sweet, beautiful, and loving as you are! ✨🧿<br><br>Thank you for everything you've changed in me... 💌🤗</p>
            <div class="emojis">🎉🥂🎁✨💫</div>
            <label for="card-toggle" class="close-link">
                ← Back to Surprise
            </label>
        </div>
    </div>
</body>
</html>
